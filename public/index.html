<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader Bot</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .status {
            font-size: 1.2rem;
            margin: 1rem 0;
        }
        .emoji {
            font-size: 4rem;
            margin: 1rem 0;
        }
        .info {
            margin-top: 2rem;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .platforms {
            margin-top: 1.5rem;
            font-size: 1rem;
        }
        a {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🎬</div>
        <h1>Video Downloader Bot</h1>
        <div class="status">✅ Bot is running</div>
        <div class="platforms">
            Supported: YouTube · Facebook · Instagram · Twitter/X · TikTok
        </div>
        <div class="info">
            <p>This is a Telegram webhook service for downloading videos from various platforms.</p>
            <p>To use this bot, search for it on Telegram or contact the administrator.</p>
        </div>
    </div>
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
